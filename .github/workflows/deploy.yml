name: Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  studio:
    name: Studio
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: ".node-version"
          cache: "pnpm"

      - name: Install dependencies
        run: |
          pnpm ci

      - name: Deploy Studio
        id: deploy
        run: |
          DEPLOY_URL=$(pnpm dlx sanity deploy --yes | grep -o 'https://.*.sanity.studio/' | tail -1)
          echo "DEPLOY_URL=$DEPLOY_URL" >> $GITHUB_ENV
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
        env:
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_API_DEPLOY_TOKEN }}

  party:
    name: PartyKit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: ".node-version"
          cache: "pnpm"

      - name: Install dependencies
        run: |
          pnpm ci

      - name: Deploy PartyKit
        id: deploy
        run: |
          DEPLOY_URL=$(pnpm dlx partykit deploy | grep -o 'https://[^ ]*' | tail -1)
          echo "DEPLOY_URL=$DEPLOY_URL" >> $GITHUB_ENV
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          PARTYKIT_LOGIN: ${{ secrets.PARTYKIT_LOGIN }}
          PARTYKIT_TOKEN: ${{ secrets.PARTYKIT_TOKEN }}
